name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  claude-review:
    name: Claude Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Read the full diff with `gh pr diff`, then read
            the repository's CLAUDE.md files for project conventions.

            ## Severity Tiers — classify every finding

            - **Critical**: Logic bugs, security vulnerabilities, data corruption,
              unsound unsafe code, invariant violations → must fix before merge.
            - **Should-Fix**: Missing error handling on public API boundaries,
              untested new code paths, incorrect doc comments that would mislead
              consumers → should fix before merge.
            - **Minor**: Naming suggestions, small style preferences, test
              improvements that don't affect correctness → note inline but do NOT
              block merge.
            - **Note**: Design alternatives, future considerations, performance
              ideas → informational only, do NOT block merge.

            ## Rules

            - Do NOT flag issues that `cargo clippy`, `cargo fmt`, or the Rust
              compiler already catch — those are enforced in CI.
            - Do NOT flag style preferences unless they violate a specific rule in
              the repo's CLAUDE.md.
            - Do NOT repeat suggestions from previous review cycles that were
              already addressed or explicitly declined.
            - Be concise. A clean review should be a few lines, not an essay.
            - Every finding must include its severity tier in bold at the start.

            ## Verdict

            End your review with exactly one of:
            - **APPROVE** — no Critical or Should-Fix issues found.
            - **REQUEST CHANGES** — one or more Critical or Should-Fix issues
              exist (list them).

            If only Minor and Note items exist, the verdict MUST be **APPROVE**.

            Use `gh pr comment` with your Bash tool to leave your review as a
            comment on the PR.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Read,Grep,Glob"'
